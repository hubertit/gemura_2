# Gemura & Orora web apps – app.gemura.rw → :3006, app.orora.rw → :3011
# Deploy to server: /etc/nginx/sites-available/gemura-orora.conf
# Enable: ln -sf /etc/nginx/sites-available/gemura-orora.conf /etc/nginx/sites-enabled/
# SSL: certbot adds 443 blocks; or paste your cert paths in the ssl_server blocks below.

# Upstream for certbot webroot (optional; certbot --nginx uses its own method)
# Uncomment if using certbot certonly --webroot -w /var/www/certbot
# location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; }

# ----- app.gemura.rw (Gemura Web, port 3006) -----
# HTTP (redirect to HTTPS when Cloudflare Origin cert is used)
server {
    listen 80;
    listen [::]:80;
    server_name app.gemura.rw;

    # API proxy – same-origin so HTTPS page can call API without mixed content
    location /api/ {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

# HTTPS (Cloudflare Origin Certificate)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app.gemura.rw;

    ssl_certificate     /etc/nginx/ssl/gemura-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/gemura-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # API proxy – same-origin so HTTPS page can call API without mixed content
    location /api/ {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

# ----- app.orora.rw (Orora Web, port 3011) -----
server {
    listen 80;
    listen [::]:80;
    server_name app.orora.rw;

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

# ----- HTTPS (enabled after running certbot, or add your cert paths here) -----
# Certbot will auto-add 443 server blocks when you run: certbot --nginx -d app.gemura.rw -d app.orora.rw
# If using your own certificates, duplicate the server blocks above, add the following and listen 443 ssl:
#
#     listen 443 ssl;
#     listen [::]:443 ssl;
#     ssl_certificate     /path/to/fullchain.pem;
#     ssl_certificate_key /path/to/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
#
